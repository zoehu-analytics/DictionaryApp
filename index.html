<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#2563EB">
  <title>Dictionary</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1 class="header-title">Dictionary</h1>
    <div class="header-actions">
      <button id="flashcardsTab" class="header-btn" aria-label="Flashcards">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M12 4v16M2 12h20"/>
        </svg>
        <span id="flashcardBadge" class="badge hidden">0</span>
      </button>
    </div>
  </header>

  <!-- Search View -->
  <main id="searchView" class="view active">
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search for a word..." autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
      <button id="searchBtn" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
      </button>
    </div>

    <div id="historyChips" class="history-chips hidden"></div>
    <div id="results" class="results"></div>
    <div id="welcomeMessage" class="welcome">
      <div class="welcome-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <p>Type a word to look it up</p>
    </div>
  </main>

  <!-- Flashcards View -->
  <main id="flashcardsView" class="view">
    <!-- Browse Mode -->
    <div id="flashcardsBrowse" class="fc-browse">
      <div class="fc-browse-header">
        <button id="fcBackBtn" class="fc-back-btn" aria-label="Back to search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <h2 id="fcTitle">Flashcards <span id="fcCount">(0)</span></h2>
        <button id="fcStudyBtn" class="fc-study-btn">Study</button>
      </div>
      <div id="fcList" class="fc-list"></div>
      <div id="fcEmpty" class="fc-empty">
        <p>No flashcards yet.</p>
        <p class="fc-empty-sub">Search for words and save them to build your deck.</p>
      </div>
    </div>

    <!-- Study Mode -->
    <div id="flashcardsStudy" class="fc-study hidden">
      <div class="fc-study-header">
        <button id="fcExitStudy" class="fc-back-btn" aria-label="Exit study">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
        <span id="fcProgress">1 / 0</span>
      </div>
      <div class="fc-progress-bar">
        <div id="fcProgressFill" class="fc-progress-fill"></div>
      </div>
      <div id="fcCard" class="fc-card">
        <div class="fc-card-inner">
          <div class="fc-card-front">
            <span id="fcWordFront" class="fc-word"></span>
            <button id="fcAudioFront" class="fc-audio-btn hidden" aria-label="Pronounce">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            </button>
            <span class="fc-hint">tap to reveal</span>
          </div>
          <div class="fc-card-back">
            <div id="fcCardContent" class="fc-card-content"></div>
          </div>
        </div>
      </div>
      <div class="fc-actions">
        <button id="fcAgainBtn" class="fc-action-btn fc-again">Study Again</button>
        <button id="fcGotItBtn" class="fc-action-btn fc-gotit">Got It</button>
      </div>
    </div>
  </main>

  <script src="js/flashcards.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
